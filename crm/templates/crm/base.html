<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900">
    {% if user.is_authenticated %}
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-indigo-800 text-white flex flex-col transition-all duration-300">
            <div class="h-16 flex items-center justify-center border-b border-indigo-700">
                <h1 class="text-2xl font-bold tracking-wider relative flex items-center gap-2">
                    <i class="fas fa-chart-pie text-indigo-300"></i> CRM Pro
                </h1>
            </div>
            <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
                <a href="{% url 'dashboard' %}"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg bg-indigo-900 text-white transition-colors">
                    <i class="fas fa-home w-5"></i> Dashboard
                </a>
                <a href="{% url 'account-list' %}"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-indigo-700 text-indigo-100 transition-colors">
                    <i class="far fa-building w-5"></i> Accounts
                </a>
                <a href="{% url 'lead-list' %}"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-indigo-700 text-indigo-100 transition-colors">
                    <i class="fas fa-bullseye w-5"></i> Leads
                </a>
                <a href="{% url 'opportunity-list' %}"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-indigo-700 text-indigo-100 transition-colors">
                    <i class="fas fa-handshake w-5"></i> Opportunities
                </a>
            </nav>
            <div class="p-4 border-t border-indigo-700 text-sm flex items-center justify-between">
                <span class="truncate">{{ user.username }}</span>
                <form action="{% url 'logout' %}" method="post" class="inline">
                    {% csrf_token %}
                    <button type="submit" class="text-indigo-300 hover:text-white transition-colors" title="Logout">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </form>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-screen overflow-hidden">
            <!-- Header -->
            <header
                class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 z-10 shadow-sm">
                <h2 class="text-xl font-semibold text-gray-800">{% block header_title %}Dashboard{% endblock %}</h2>
            </header>

            <!-- Page Content -->
            <div class="flex-1 overflow-y-auto p-8 bg-gray-50">
                {% block content %}
                {% endblock %}
            </div>
        </main>
    </div>
    {% else %}
    {% block auth_content %}
    {% endblock %}
    {% endif %}
</body>

</html>
