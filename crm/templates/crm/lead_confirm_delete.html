{% extends 'crm/base.html' %}

{% block header_title %}Delete Lead{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto mt-10">
    <div class="bg-white rounded-xl shadow-sm border border-red-100 overflow-hidden text-center p-8">
        <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-4">
            <i class="fas fa-exclamation-triangle text-red-600 text-xl"></i>
        </div>

        <h3 class="text-xl font-semibold text-gray-900 mb-2">Delete Lead</h3>
        <p class="text-gray-500 mb-6">
            Are you sure you want to delete the lead for <strong>{{ object.first_name }} {{ object.last_name
                }}</strong>?
            This action cannot be undone.
        </p>

        <form method="post" class="flex items-center justify-center gap-4">
            {% csrf_token %}
            <a href="{% url 'lead-list' %}"
                class="px-4 py-2 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
                Cancel
            </a>
            <button type="submit"
                class="px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition-colors">
                Yes, Delete
            </button>
        </form>
    </div>
</div>
{% endblock %}
