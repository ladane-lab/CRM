{% extends 'crm/base.html' %}

{% block auth_content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-xl border border-gray-100">
        <div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900 border-b pb-4">
                <i class="fas fa-chart-pie text-indigo-600 mr-2"></i> CRM Pro
            </h2>
            <h3 class="mt-2 text-center text-xl text-gray-600">
                Sign in to your account
            </h3>
        </div>
        <form class="mt-8 space-y-6" action="{% url 'login' %}" method="POST">
            {% csrf_token %}
            <div class="rounded-md shadow-sm space-y-4">
                <div>
                    <label for="{{ form.username.id_for_label }}"
                        class="block text-sm font-medium text-gray-700">Username</label>
                    <input id="{{ form.username.id_for_label }}" name="{{ form.username.html_name }}" type="text"
                        required
                        class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm mt-1"
                        placeholder="Username">
                </div>
                <div>
                    <label for="{{ form.password.id_for_label }}"
                        class="block text-sm font-medium text-gray-700">Password</label>
                    <input id="{{ form.password.id_for_label }}" name="{{ form.password.html_name }}" type="password"
                        required
                        class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm mt-1"
                        placeholder="Password">
                </div>
            </div>

            {% if form.errors %}
            <div class="text-red-500 text-sm text-center">
                Invalid username or password. Please try again.
            </div>
            {% endif %}

            <div>
                <button type="submit"
                    class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors shadow-md">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                        <i class="fas fa-lock text-indigo-500 group-hover:text-indigo-400"></i>
                    </span>
                    Sign in
                </button>
            </div>

            <div class="text-sm text-center mt-4 text-gray-600">
                Don't have an account? <a href="{% url 'signup' %}"
                    class="font-medium text-indigo-600 hover:text-indigo-500 transition-colors">Sign up</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
