{% extends 'crm/base.html' %}

{% block auth_content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-50 via-white to-purple-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white/80 backdrop-blur-xl p-10 rounded-3xl shadow-2xl border border-white flex flex-col relative overflow-hidden">
        <!-- Decorative Background Element -->
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-indigo-50 rounded-full blur-3xl opacity-50"></div>
        <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-purple-50 rounded-full blur-3xl opacity-50"></div>

        <div class="relative">
            <div class="flex justify-center mb-6">
                <div class="h-20 w-20 bg-indigo-100 rounded-2xl flex items-center justify-center shadow-inner transform rotate-12">
                    <i class="fas fa-chart-pie text-3xl text-indigo-600 -rotate-12"></i>
                </div>
            </div>
            <h2 class="text-center text-3xl font-extrabold text-gray-900 tracking-tight">
                Welcome to CRM Pro
            </h2>
            <p class="mt-2 text-center text-sm text-gray-500">
                The most advanced way to manage your sales pipeline.
            </p>
        </div>
        
        <form class="mt-8 space-y-6 relative" action="{% url 'login' %}" method="POST">
            {% csrf_token %}
            
            <div class="space-y-4">
                <!-- Username Field -->
                <div class="relative">
                    <label for="{{ form.username.id_for_label }}" class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-1.5 ml-1">
                        Username or Email
                    </label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none z-10">
                            <i class="far fa-user text-gray-400 group-focus-within:text-indigo-500 transition-colors"></i>
                        </div>
                        <input id="{{ form.username.id_for_label }}" name="{{ form.username.html_name }}" type="text"
                            required
                            class="appearance-none block w-full px-4 py-3.5 pl-11 bg-gray-50/50 border border-gray-200 placeholder-gray-400 text-gray-900 rounded-xl focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all text-sm"
                            placeholder="username">
                    </div>
                </div>

                <!-- Password Field -->
                <div class="relative">
                    <label for="{{ form.password.id_for_label }}" class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-1.5 ml-1">
                        Password
                    </label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none z-10">
                            <i class="fas fa-fingerprint text-gray-400 group-focus-within:text-indigo-500 transition-colors"></i>
                        </div>
                        <input id="{{ form.password.id_for_label }}" name="{{ form.password.html_name }}" type="password"
                            required
                            class="appearance-none block w-full px-4 py-3.5 pl-11 bg-gray-50/50 border border-gray-200 placeholder-gray-400 text-gray-900 rounded-xl focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all text-sm"
                            placeholder="••••••••">
                    </div>
                </div>
            </div>

            {% if form.errors %}
            <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded-r-lg">
                <div class="flex items-center gap-3">
                    <i class="fas fa-circle-exclamation text-red-400"></i>
                    <p class="text-xs font-medium text-red-700">Invalid credentials. Please try again.</p>
                </div>
            </div>
            {% endif %}

            <div class="pt-2">
                <button type="submit"
                    class="group relative w-full flex justify-center py-4 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all duration-200 transform hover:-translate-y-0.5 shadow-xl active:scale-95">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                        <i class="fas fa-lock text-indigo-300 group-hover:text-white transition-colors"></i>
                    </span>
                    Sign in to Workspace
                </button>
            </div>

            <div class="text-sm text-center mt-6">
                <span class="text-gray-500">New here?</span>
                <a href="{% url 'signup' %}"
                    class="font-bold text-indigo-600 hover:text-indigo-500 underline decoration-indigo-200 underline-offset-4 transition-all hover:decoration-indigo-500">Create an account</a>
            </div>
        </form>
    </div>
</div>

<style>
    /* Animation for the card entrance */
    .max-w-md {
        animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
{% endblock %}
